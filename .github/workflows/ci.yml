name: CI

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    if: ${{ github.repository_owner == 'Itosang' && (github.event_name != 'push' || !startsWith(github.event.head_commit.message, '[skip ci]')) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          fetch-depth: 0

      - name: Resolve build channel
        id: channel
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          gitCommitCount=`git rev-list --count HEAD`
          commitHeader=`git log -1 --pretty=%s`
          releaseTagPattern='^v[0-9]+(\.[0-9]+)*-release$'
          prereleaseTagPattern='^v[0-9]+(\.[0-9]+)*-prerelease[0-9]+$'
          previousReleaseTag=`git tag --sort=-creatordate | grep -E "$releaseTagPattern" | head -n 1 || true`

          if [ "$EVENT_NAME" = "push" ] && [[ "$commitHeader" == "[release]"* ]]; then
            versionSuffix="-release"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "version_suffix=$versionSuffix" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_NAME" = "push" ] && [[ "$commitHeader" == "[prerelease]"* ]]; then
            prereleaseCount=0
            for tag in `git tag --sort=-creatordate`; do
              if echo "$tag" | grep -Eq "$prereleaseTagPattern"; then
                if [ -z "$previousReleaseTag" ] || git merge-base --is-ancestor "$previousReleaseTag" "$tag"; then
                  prereleaseCount=$((prereleaseCount + 1))
                fi
              fi
            done
            versionSuffix="-prerelease$((prereleaseCount + 1))"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            echo "version_suffix=$versionSuffix" >> "$GITHUB_OUTPUT"
            echo "prerelease_index=$((prereleaseCount + 1))" >> "$GITHUB_OUTPUT"
          else
            versionSuffix="-alpha$gitCommitCount"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            echo "version_suffix=$versionSuffix" >> "$GITHUB_OUTPUT"
          fi

          echo "git_commit_count=$gitCommitCount" >> "$GITHUB_OUTPUT"
          echo "previous_release_tag=$previousReleaseTag" >> "$GITHUB_OUTPUT"
          echo "gradle_args=-PversionNameSuffix=$versionSuffix" >> "$GITHUB_OUTPUT"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          cache: 'gradle'

      - name: Write key
        if: github.event_name != 'pull_request'
        run: |
          touch signing.properties
          echo KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }} >> signing.properties
          echo KEYSTORE_ALIAS=${{ secrets.KEYSTORE_ALIAS }} >> signing.properties
          echo KEYSTORE_ALIAS_PASSWORD='${{ secrets.KEYSTORE_ALIAS_PASSWORD }}' >> signing.properties
          echo KEYSTORE_FILE=../key.jks >> signing.properties
          echo '${{ secrets.KEYSTORE }}' | base64 --decode > key.jks

      - name: Write temporary key
        if: hashFiles('key.jks') == ''
        run: |
          keytool -genkey -alias a -dname CN=_ -storepass passwd -keypass passwd -keystore key.jks -keyalg RSA
          echo KEYSTORE_PASSWORD=passwd >> signing.properties
          echo KEYSTORE_ALIAS=a >> signing.properties
          echo KEYSTORE_ALIAS_PASSWORD=passwd >> signing.properties
          echo KEYSTORE_FILE=../key.jks >> signing.properties

      - name: Cache Gradle Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            !~/.gradle/caches/build-cache-*
          key: gradle-deps-app-${{ hashFiles('**/build.gradle.kts') }}
          restore-keys: |
            gradle-deps

      - name: Cache Gradle Build
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/build-cache-*
          key: gradle-builds-app-${{ github.sha }}
          restore-keys: |
            gradle-builds

      - name: Build with Gradle
        id: buildWithGradle
        run: |
          echo >> gradle.properties
          echo 'org.gradle.caching=true' >> gradle.properties
          echo 'org.gradle.parallel=true' >> gradle.properties
          echo 'org.gradle.vfs.watch=true' >> gradle.properties
          echo 'org.gradle.jvmargs=-Xmx2048m' >> gradle.properties
          chmod +x gradlew
          versionMetadata=`./gradlew -q :app:printVersionMetadata ${{ steps.channel.outputs.gradle_args }}`
          releaseVersionName=`printf '%s\n' "$versionMetadata" | sed -n 's/^versionName=//p'`
          versionCode=`printf '%s\n' "$versionMetadata" | sed -n 's/^versionCode=//p'`
          tagName=`printf '%s\n' "$versionMetadata" | sed -n 's/^releaseTag=//p'`
          releaseTitle=`printf '%s\n' "$versionMetadata" | sed -n 's/^releaseTitle=//p'`
          ./gradlew :app:assembleRelease :app:assembleDebug ${{ steps.channel.outputs.gradle_args }}

          releaseApk=`ls app/build/outputs/apk/release/batteryrecorder-v*.apk`
          debugApk=`ls app/build/outputs/apk/debug/batteryrecorder*-v*-debug.apk`
          releaseArtifactName="release-$tagName"
          debugArtifactName="debug-$tagName"
          mappingFile="out/mapping/mapping-${releaseVersionName}.txt"

          echo "releaseApk=$releaseApk" >> "$GITHUB_OUTPUT"
          echo "debugApk=$debugApk" >> "$GITHUB_OUTPUT"
          echo "releaseArtifactName=$releaseArtifactName" >> "$GITHUB_OUTPUT"
          echo "debugArtifactName=$debugArtifactName" >> "$GITHUB_OUTPUT"
          echo "releaseVersionName=$releaseVersionName" >> "$GITHUB_OUTPUT"
          echo "versionCode=$versionCode" >> "$GITHUB_OUTPUT"
          echo "tagName=$tagName" >> "$GITHUB_OUTPUT"
          echo "releaseTitle=$releaseTitle" >> "$GITHUB_OUTPUT"
          echo "mappingFile=$mappingFile" >> "$GITHUB_OUTPUT"

      - name: Upload release
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.buildWithGradle.outputs.releaseArtifactName }}
          path: "app/build/outputs/apk/release/*.apk"

      - name: Upload debug
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.buildWithGradle.outputs.debugArtifactName }}
          path: "app/build/outputs/apk/debug/*.apk"

      - name: Upload mappings
        uses: actions/upload-artifact@v4
        with:
          name: mappings
          path: "app/build/outputs/mapping/release"

      - name: Generate release notes
        if: success() && steps.channel.outputs.should_publish == 'true'
        id: releaseNotes
        run: |
          previousTag="${{ steps.channel.outputs.previous_release_tag }}"
          notesFile=release-notes.md
          repoUrl="${{ github.server_url }}/${{ github.repository }}"
          conventionalCommitPattern='^([[:alpha:]]+(\([^)]+\))?!?:)[[:space:]]+(.+)$'
          compareRange=HEAD
          if [ -n "$previousTag" ]; then
            compareRange="$previousTag..HEAD"
          fi

          {
            echo "<!-- versionCode:${{ steps.buildWithGradle.outputs.versionCode }} -->"
            echo
            echo "## 变更"
            echo
            commitCount=0
            while IFS=$'\t' read -r fullHash shortHash subject; do
              if [ -z "$fullHash" ]; then
                continue
              fi

              if [[ "$subject" == "[skip ci]"* ]] || [[ "$subject" == *"doc:"* ]] || [[ "$subject" == "Merge remote-tracking branch 'origin/main'"* ]]; then
                continue
              fi

              case "$subject" in
                *"[release]"*|*"[prerelease]"*)
                  continue
                  ;;
              esac

              if [[ "$subject" == "Merge pull request "* ]]; then
                subject="**merge:** ${subject#Merge }"
              elif [[ "$subject" == "Revert "* ]]; then
                subject="**revert:** ${subject#Revert }"
              elif [[ "$subject" =~ $conventionalCommitPattern ]]; then
                subject="**${BASH_REMATCH[1]}** ${BASH_REMATCH[3]}"
              fi

              echo "- [\`$shortHash\`]($repoUrl/commit/$fullHash) $subject"
              commitCount=$((commitCount + 1))
            done < <(git log "$compareRange" --pretty=format:'%H%x09%h%x09%s')

            if [ "$commitCount" -eq 0 ]; then
              echo "- 无可展示变更。"
            fi
            echo
          } > "$notesFile"

          echo "notesFile=$notesFile" >> "$GITHUB_OUTPUT"

      - name: Prepare Telegram publish
        if: success()
        id: telegram
        env:
          IS_RELEASE: ${{ steps.channel.outputs.is_release }}
          IS_PRERELEASE: ${{ steps.channel.outputs.is_prerelease }}
          RELEASE_TITLE: ${{ steps.buildWithGradle.outputs.releaseTitle }}
          NOTES_FILE: ${{ steps.releaseNotes.outputs.notesFile }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          rawCaptionFile=telegram-caption-raw.txt
          captionFile=telegram-caption.txt
          shouldPush=false
          maxCaptionLength=1022

          strip_markdown() {
            sed -E 's/\[([^][]+)\]\([^)]+\)/\1/g' \
            | sed -E 's/\*\*([^*]+)\*\*/\1/g' \
            | sed -E 's/`([^`]+)`/\1/g' \
            | sed -E 's/^- [0-9a-f]{7,}[[:space:]]+/- /'
          }

          char_count() {
            printf '%s' "$1" | wc -m | awk '{print $1}'
          }

          truncate_caption() {
            inputFile="$1"
            outputFile="$2"
            caption=""
            truncated=false

            while IFS= read -r line || [ -n "$line" ]; do
              if [ -z "$caption" ]; then
                candidate="$line"
              else
                candidate=`printf '%s\n%s' "$caption" "$line"`
              fi

              if [ "$(char_count "$candidate")" -le "$maxCaptionLength" ]; then
                caption="$candidate"
                continue
              fi

              if [ -z "$caption" ]; then
                caption=`printf '%s' "$line" | cut -c1-"$maxCaptionLength"`
              fi
              truncated=true
              break
            done < "$inputFile"

            if [ "$truncated" = "true" ]; then
              if [ -n "$caption" ]; then
                caption=`printf '%s\n…' "$caption"`
              else
                caption="…"
              fi
            fi

            printf '%s\n' "$caption" > "$outputFile"
          }

          if [ "$IS_RELEASE" = "true" ]; then
            threadId=5
            shouldPush=true
            {
              echo "$RELEASE_TITLE"
              echo
              sed '/^<!-- versionCode:/d' "$NOTES_FILE" | strip_markdown
            } > "$rawCaptionFile"
          elif [ "$IS_PRERELEASE" = "true" ]; then
            threadId=7
            shouldPush=true
            {
              echo "$RELEASE_TITLE"
              echo
              sed '/^<!-- versionCode:/d' "$NOTES_FILE" | strip_markdown
            } > "$rawCaptionFile"
          elif [ "$GITHUB_REF_NAME" = "main" ]; then
            threadId=3
            commitSubject=`git log -1 --pretty=%s`
            shouldPush=true
            echo "$commitSubject" > "$rawCaptionFile"
          else
            threadId=3
          fi

          if [ "$shouldPush" = "true" ]; then
            truncate_caption "$rawCaptionFile" "$captionFile"
          fi

          echo "shouldPush=$shouldPush" >> "$GITHUB_OUTPUT"
          echo "threadId=$threadId" >> "$GITHUB_OUTPUT"
          echo "captionFile=$captionFile" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub release
        if: success() && steps.channel.outputs.should_publish == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.buildWithGradle.outputs.tagName }}
          name: ${{ steps.buildWithGradle.outputs.releaseTitle }}
          target_commitish: ${{ github.sha }}
          body_path: ${{ steps.releaseNotes.outputs.notesFile }}
          prerelease: ${{ steps.channel.outputs.is_prerelease }}
          files: |
            ${{ steps.buildWithGradle.outputs.releaseApk }}
            ${{ steps.buildWithGradle.outputs.mappingFile }}

      - name: Publish to Telegram
        if: success() && steps.telegram.outputs.shouldPush == 'true'
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN != '' && secrets.BOT_TOKEN || vars.BOT_TOKEN }}
          CHAT_ID: -1003856065409
          MESSAGE_THREAD_ID: ${{ steps.telegram.outputs.threadId }}
          CAPTION_FILE: ${{ steps.telegram.outputs.captionFile }}
          DOCUMENT_FILE: ${{ steps.buildWithGradle.outputs.releaseApk }}
        run: |
          set -euo pipefail

          apiBase="https://api.telegram.org/bot$BOT_TOKEN"
          caption=`cat "$CAPTION_FILE"`

          if [ -z "$BOT_TOKEN" ]; then
            echo "[Telegram] BOT_TOKEN 未配置" >&2
            exit 1
          fi

          telegram_api() {
            method="$1"
            shift

            response=`curl --silent --show-error --request POST "$apiBase/$method" "$@"`
            if echo "$response" | grep -q '"ok":true'; then
              return 0
            fi

            echo "[Telegram/$method] $response" >&2
            return 1
          }

          telegram_api sendDocument \
            --form chat_id="$CHAT_ID" \
            --form message_thread_id="$MESSAGE_THREAD_ID" \
            --form-string caption="$caption" \
            --form document=@"$DOCUMENT_FILE"
